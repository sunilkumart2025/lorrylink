<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#78aefe">
    <title>LoadLink Assistant</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="widget-root">
        <button
            id="chatLauncher"
            class="chat-launcher"
            type="button"
            aria-controls="chatPanel"
            aria-expanded="false"
            aria-label="Open LoadLink Assistant"
        >
            <svg class="launcher-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 3c-5.1 0-9 3.73-9 8.35 0 2.08.84 3.98 2.26 5.43L4.5 21l4.12-1.58c1.03.3 2.13.46 3.38.46 5.1 0 9-3.73 9-8.53C21 6.73 17.1 3 12 3Zm-3.75 7.5a1.25 1.25 0 1 1 0 2.5 1.25 1.25 0 0 1 0-2.5Zm3.75 0a1.25 1.25 0 1 1 0 2.5 1.25 1.25 0 0 1 0-2.5Zm3.75 0a1.25 1.25 0 1 1 0 2.5 1.25 1.25 0 0 1 0-2.5Z"></path>
            </svg>
        </button>

        <section
            id="chatPanel"
            class="chat-panel"
            hidden
            aria-hidden="true"
            aria-labelledby="chatTitle"
            role="dialog"
        >
            <header class="chat-header">
                <div class="chat-heading">
                    <p class="chat-kicker">LoadLink Assistant</p>
                    <h1 id="chatTitle" class="chat-title">Trip help</h1>
                    <p class="chat-subtitle">Simple help for delivery, ETA, tracking, navigation, and route issues.</p>
                </div>
                <button id="closeChatButton" class="close-button" type="button" aria-label="Close chat">&times;</button>
            </header>

            <div class="status-pill">
                <span id="connectionDot" class="connection-dot" aria-hidden="true"></span>
                <span id="connectionText">Built-in LoadLink answers ready</span>
            </div>

            <div class="quick-actions" aria-label="Suggested questions">
                <button class="quick-action" data-question="How to start delivery?" type="button">Start</button>
                <button class="quick-action" data-question="How to start navigation?" type="button">Navigation</button>
                <button class="quick-action" data-question="How to track truck?" type="button">Track</button>
                <button class="quick-action" data-question="What does ETA mean?" type="button">ETA</button>
            </div>

            <div id="chatMessages" class="chat-messages" aria-live="polite"></div>

            <form id="chatForm" class="chat-form">
                <label class="sr-only" for="chatInput">Ask LoadLink Assistant</label>
                <textarea
                    id="chatInput"
                    class="chat-input"
                    rows="1"
                    placeholder=""
                ></textarea>
                <button id="sendButton" class="send-button" type="submit">Send</button>
            </form>
        </section>
    </div>

    <script src="./script.js"></script>
</body>
</html>
